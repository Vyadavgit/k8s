version: "3.9"

services:
  k8s-lab:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: k8s-lab
    privileged: true
    volumes:
      # Mount host Docker socket — kind creates sibling containers on the host
      - /var/run/docker.sock:/var/run/docker.sock
      # Persist kubeconfig so kubectl works from host too
      - kube-config:/root/.kube
      # Drop YAML manifests here on your host, access at /workspace/manifests inside
      - ./manifests:/workspace/manifests
    environment:
      - KUBECONFIG=/root/.kube/config
    ports:
      # Kubernetes API server
      - "6443:6443"
      # Kubernetes Dashboard (kubectl port-forward target)
      - "8443:8443"
      # NodePorts 30080/30081 are bound directly by the kind control-plane
      # sibling container via extraPortMappings in kind-config.yaml.
    # Keep stdout/stderr streaming so 'docker compose logs -f' works
    tty: false
    stdin_open: false
    restart: unless-stopped

volumes:
  kube-config:
    name: k8s-kube-config
