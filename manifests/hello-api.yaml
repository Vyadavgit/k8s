---
# Hello World API Deployment
# Uses hashicorp/http-echo — a tiny HTTP server that returns a configurable string
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-api
  labels:
    app: hello-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-api
  template:
    metadata:
      labels:
        app: hello-api
    spec:
      containers:
        - name: hello-api
          image: hashicorp/http-echo:latest
          args:
            - "-text=Hello from Kubernetes! 🚀"
            - "-listen=:5678"
          ports:
            - containerPort: 5678
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "32Mi"
              cpu: "50m"
          readinessProbe:
            httpGet:
              path: /
              port: 5678
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 5678
            initialDelaySeconds: 5
            periodSeconds: 10
---
# ClusterIP service for internal access (pod-to-pod)
apiVersion: v1
kind: Service
metadata:
  name: hello-api
spec:
  selector:
    app: hello-api
  ports:
    - name: http
      port: 80
      targetPort: 5678
  type: ClusterIP
---
# NodePort service for external access from your Mac
apiVersion: v1
kind: Service
metadata:
  name: hello-api-nodeport
spec:
  selector:
    app: hello-api
  ports:
    - name: http
      port: 80
      targetPort: 5678
      nodePort: 30081
  type: NodePort
